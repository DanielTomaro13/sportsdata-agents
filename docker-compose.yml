# Local DEV datastore — Postgres + TimescaleDB (D7). Odds history / prices live on
# Timescale hypertables (created via Alembic at M0.3 / M2.1).
# Dev-only: not a deployed surface. The port is bound to loopback and the password is
# overridable so it isn't reachable from the network with a known default.
services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: sportsdata_agents_db
    environment:
      POSTGRES_USER: agents
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agents}
      POSTGRES_DB: sportsdata_agents
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - agents_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agents -d sportsdata_agents"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agents_pgdata:
