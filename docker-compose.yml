# Local dev datastore — Postgres + TimescaleDB (D7). Odds history / prices live on
# Timescale hypertables (created via Alembic at M0.3 / M2.1).
services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: sportsdata_agents_db
    environment:
      POSTGRES_USER: agents
      POSTGRES_PASSWORD: agents
      POSTGRES_DB: sportsdata_agents
    ports:
      - "5432:5432"
    volumes:
      - agents_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agents -d sportsdata_agents"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agents_pgdata:
