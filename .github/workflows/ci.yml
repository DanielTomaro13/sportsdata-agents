name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable + dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy

      - name: Tests (offline, no eval)
        # `live` hits real endpoints; `eval` is scheduled — neither runs in default CI.
        run: pytest -m "not live and not eval"

  test-postgres:
    # Prod-dialect coverage: the integration suite against a real Postgres
    # (JSON/Numeric/timezone semantics differ from SQLite).
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agents
          POSTGRES_PASSWORD: agents
          POSTGRES_DB: agents_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U agents"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install (editable + dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Integration tests on Postgres
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://agents:agents@localhost:5432/agents_test
        run: pytest -m integration
