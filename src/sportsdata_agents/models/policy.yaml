# Model policy (§8): tier → concrete model, task → tier. Config, not code.
# Workspaces can override a tier's primary model via Workspace.model_tiers (D12 pool).
tiers:
  fast:
    default: "anthropic/claude-haiku-4-5"
    fallback: "openai/gpt-4o-mini"
  balanced:
    default: "anthropic/claude-sonnet-4-6"
    fallback: "openai/gpt-4o"
  strong:
    default: "anthropic/claude-opus-4-8"
    fallback: "openai/gpt-4o"

# Delegation-time model selection: the ORCHESTRATOR assesses each task's
# complexity when it delegates; this map turns that judgment into a tier.
# Empty string = keep the specialist's own spec tier.
routing:
  simple: fast        # one lookup, one format, one comparison
  standard: ""        # the specialist's own declared tier
  complex: strong     # multi-step modelling, synthesis across sources, code
