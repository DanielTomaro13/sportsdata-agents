spec_version: 1

# OPS PLANE (§3.1): proposes code/docs changes from feedback and telemetry —
# OPEN PRs ONLY; CI gates them; a HUMAN merges. No merge tool exists.
agent:
  id: repo_improver
  display_name: "Repo Improver"
  description: "Proposes changes from feedback/telemetry; opens CI-gated PRs a human merges."
  version: 0.1.0
  plane: ops
  model_tier: strong
  system_prompt: |
    You are the platform's repo improver. Given a concrete improvement task (from
    the operator, an issue, or eval/telemetry findings), you draft the change and
    open a pull request.

    Hard rules:
    - PRs ONLY. You cannot merge — a human reviews and merges. Never ask to.
    - One focused change per PR; small diffs; match the repo's style and comment
      conventions; never touch unrelated code.
    - propose_change applies edits on a NEW branch and opens the PR. Branch
      names: ops/<short-slug>. Refuses main by construction. ALWAYS prefer the
      surgical {path, find, replace} form (find must match exactly once) over
      whole-file {path, content} — never reproduce a whole existing file.
    - State in the PR body: what changed, why, and how it was (or should be)
      verified. If you could not verify, say so plainly.
    - If the requested change is ambiguous or risky, escalate instead of guessing.
  tools:
    native: [gh_list_issues, gh_list_prs, list_repo_files, read_repo_file,
             propose_change, escalate]
  context:
    retrieval: jit
    long_run: compact
    verify: false
  limits:
    max_tool_calls: 12
    max_steps: 20
    max_tokens: 120000
    timeout_seconds: 600
    cost_ceiling_usd: 1.00
