<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Betfair money flow</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2330; --line: #2a3140;
    --text: #e6edf3; --dim: #8b96a5; --accent: #f0b429;
    --steam: #ff5d5d; --drift: #58a6ff; --money: #3fb950;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font: 14px/1.45 -apple-system, "Segoe UI", Roboto, sans-serif; }
  .wrap { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
  @media (max-width: 860px) { .wrap { grid-template-columns: 1fr; grid-template-rows: 40vh 1fr; } }

  aside { background: var(--panel); border-right: 1px solid var(--line); overflow-y: auto; }
  aside header { position: sticky; top: 0; background: var(--panel); padding: 14px 16px 12px; border-bottom: 1px solid var(--line); z-index: 2; }
  aside h1 { font-size: 15px; letter-spacing: .4px; }
  aside h1 span { color: var(--accent); }
  select, input[type=search] { width: 100%; margin-top: 10px; background: var(--panel2); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 6px 8px; font: inherit; font-size: 13px; }
  input[type=search]::placeholder { color: var(--dim); }
  .race { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; background: none; border: none; border-bottom: 1px solid var(--line); color: var(--text); padding: 10px 14px; cursor: pointer; font: inherit; }
  .race:hover { background: var(--panel2); }
  .race.sel { background: var(--panel2); box-shadow: inset 3px 0 var(--accent); }
  .race .v { font-weight: 600; font-size: 13px; }
  .race .m { color: var(--dim); font-size: 12px; }
  .race .ttj { margin-left: auto; font-variant-numeric: tabular-nums; font-size: 12px; color: var(--dim); white-space: nowrap; }
  .race .ttj.soon { color: var(--accent); font-weight: 700; }
  .race .ttj.live { color: var(--steam); font-weight: 700; }
  .note { color: var(--dim); font-size: 12px; padding: 14px; }

  main { overflow-y: auto; padding: 18px 22px; }
  .empty { color: var(--dim); margin-top: 30vh; text-align: center; }
  #head { display: flex; flex-wrap: wrap; align-items: center; gap: 10px 18px; margin-bottom: 4px; }
  #head h2 { font-size: 20px; }
  #head select { width: auto; margin: 0; }
  .badge { background: var(--panel2); border: 1px solid var(--line); border-radius: 6px; padding: 2px 10px; font-size: 12px; color: var(--dim); }
  .badge b { color: var(--text); font-variant-numeric: tabular-nums; }
  .badge.live { border-color: var(--steam); color: var(--steam); }
  .badge.tight { border-color: var(--money); color: var(--money); }

  .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 14px; margin: 12px 0 10px; padding: 8px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .ctrl { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--dim); }
  .ctrl select { width: auto; margin: 0; padding: 4px 6px; font-size: 12px; }
  .ctrl input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; }
  .ctrl label { cursor: pointer; user-select: none; }
  button.tbtn { background: var(--panel2); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 5px 12px; font: inherit; font-size: 12px; cursor: pointer; }
  button.tbtn.on { border-color: var(--accent); color: var(--accent); }
  .hint { color: var(--dim); font-size: 11px; }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .6px; padding: 6px 8px; border-bottom: 1px solid var(--line); }
  th.num, td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td { padding: 7px 8px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  tr.steamrow td:first-child { box-shadow: inset 3px 0 var(--steam); }
  tr.driftrow td:first-child { box-shadow: inset 3px 0 var(--drift); }
  td.name { font-weight: 600; }
  td.price { font-size: 16px; font-weight: 700; white-space: nowrap; }
  .dir { font-size: 11px; margin-left: 4px; }
  .steam { color: var(--steam); } .drift { color: var(--drift); }
  .imp { color: var(--dim); font-size: 11px; }
  .spark { width: 120px; height: 26px; }
  .flowcell { min-width: 180px; }
  .flowbar { height: 14px; border-radius: 3px; background: var(--money); min-width: 2px; opacity: .9; }
  .flowbar.zero { background: var(--line); }
  .flowrow { display: flex; align-items: center; gap: 8px; }
  .flowpct { color: var(--dim); font-size: 12px; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .sizes { color: var(--dim); font-size: 11px; white-space: nowrap; }
  .womwrap { display: flex; align-items: center; gap: 8px; min-width: 150px; }
  .wom { width: 70px; height: 10px; border-radius: 3px; background: var(--steam); overflow: hidden; }
  .womback { height: 100%; background: var(--money); }
  #foot { color: var(--dim); font-size: 11px; margin-top: 12px; }
  .pulse { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--money); margin-right: 6px; animation: pulse 2s infinite; }
  .pulse.paused { background: var(--dim); animation: none; }
  @keyframes pulse { 50% { opacity: .25; } }
</style>
</head>
<body>
<div class="wrap">
  <aside>
    <header>
      <h1>💸 Betfair <span>money flow</span></h1>
      <select id="sport"></select>
      <input type="search" id="search" placeholder="filter races / matches…" autocomplete="off">
    </header>
    <div id="races"><div class="note">loading sports…</div></div>
  </aside>
  <main>
    <div class="empty" id="empty">← pick a sport, then a race or match</div>
    <div id="board" style="display:none">
      <div id="head">
        <h2 id="title"></h2>
        <span id="pickerbox"></span>
        <span id="badges"></span>
      </div>
      <div class="controls">
        <span class="ctrl">Sort
          <select id="sortby">
            <option value="price">Price (favourite first)</option>
            <option value="flow">Money flow (60s)</option>
            <option value="move">Biggest move</option>
          </select>
        </span>
        <span class="ctrl">Min liquidity
          <select id="minliq">
            <option value="0">All</option>
            <option value="500">$500</option>
            <option value="2000">$2k</option>
            <option value="10000">$10k</option>
          </select>
        </span>
        <span class="ctrl">
          <input type="checkbox" id="tradeable">
          <label for="tradeable" title="Hide lay-only dead pegs and longshots — keeps lines priced roughly 1.2–7.0. Best for busy handicap markets.">Tradeable lines only</label>
        </span>
        <button class="tbtn" id="pause">⏸ Pause</button>
        <span class="hint" id="rowcount"></span>
      </div>
      <table>
        <thead><tr>
          <th>Selection</th><th class="num">Back</th><th class="num">Lay</th>
          <th class="num">Last</th><th>Price (session)</th>
          <th>Money in last 60s (est)</th><th>Pressure (back vs lay $)</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="foot"></div>
    </div>
  </main>
</div>
<script>
const $ = (id) => document.getElementById(id);
const fmtMoney = (v) => v >= 1000 ? "$" + (v / 1000).toFixed(v >= 10000 ? 0 : 1) + "k" : "$" + Math.round(v);
const fmtOdds = (v) => v == null ? "—" : (v < 10 ? v.toFixed(2) : v.toFixed(1));
// Betfair names carry &, <, ', quotes (team names, sponsors) — escape before
// any innerHTML interpolation so they render as text, not markup.
const esc = (s) => String(s ?? "").replace(/[&<>"']/g,
  c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

const SPORT_ICON = {
  "Horse Racing": "🐎", "Greyhound Racing": "🐕", "Soccer": "⚽", "Tennis": "🎾",
  "Cricket": "🏏", "Rugby Union": "🏉", "Rugby League": "🏉", "Australian Rules": "🏉",
  "Basketball": "🏀", "Baseball": "⚾", "Ice Hockey": "🏒", "American Football": "🏈",
  "Golf": "⛳", "Boxing": "🥊", "Mixed Martial Arts": "🥋", "Darts": "🎯",
  "Snooker": "🎱", "Motor Sport": "🏎", "Cycling": "🚴", "Esports": "🎮",
  "Politics": "🗳", "Special Bets": "✨",
};

// settings persist across reloads
const store = {
  get: (k, d) => { try { const v = localStorage.getItem("mf_" + k); return v === null ? d : JSON.parse(v); } catch (e) { return d; } },
  set: (k, v) => { try { localStorage.setItem("mf_" + k, JSON.stringify(v)); } catch (e) {} },
};

let items = [], selected = null, currentItem = null, lastMarket = null;
let searchText = "", paused = false;
let history = {};       // selection name -> [{t, est, price}]
let cumEst = {};        // selection name -> cumulative estimated matched flow
let prevTotal = null;   // market totalMatched at previous poll
let pollTimer = null, marketId = null, pollGen = 0, listGen = 0;

function ttj(startIso, inplay) {
  if (inplay) return { text: "LIVE", cls: "live" };
  if (!startIso) return { text: "", cls: "" };
  const s = (new Date(startIso) - Date.now()) / 1000;
  if (s <= -120) return { text: "started", cls: "live" };
  if (s <= 0) return { text: "starting", cls: "live" };
  const m = Math.floor(s / 60);
  if (m >= 2880) return { text: Math.floor(m / 1440) + "d", cls: "" };
  if (m >= 60) return { text: Math.floor(m / 60) + "h " + (m % 60) + "m", cls: "" };
  return { text: m + "m " + Math.floor(s % 60) + "s", cls: m < 5 ? "soon" : "" };
}

function renderItems() {
  const box = $("races");
  box.innerHTML = "";
  const q = searchText.trim().toLowerCase();
  const visible = items
    .filter(r => !r.start || new Date(r.start) - Date.now() > -6 * 3600000 || r.inplay)
    .filter(r => !q || (r.label + " " + (r.sub || "")).toLowerCase().includes(q));
  if (!visible.length) { box.innerHTML = '<div class="note">' + (q ? "no matches for “" + q + "”" : "nothing listed right now") + '</div>'; return; }
  visible.forEach(r => {
    const t = ttj(r.start, r.inplay);
    const el = document.createElement("button");
    el.className = "race" + (selected === r.marketId ? " sel" : "");
    el.innerHTML = `<span><div class="v">${esc(r.label)}</div>
      <div class="m">${esc(r.sub || "")}</div></span>
      <span class="ttj ${t.cls}"></span>`;
    const tick = el.querySelector(".ttj");
    tick.textContent = t.text;
    tick.dataset.start = r.start || "";
    tick.dataset.inplay = r.inplay ? "1" : "";
    el.onclick = () => selectItem(r);
    box.appendChild(el);
  });
}

function tickCountdowns() {
  document.querySelectorAll("#races .ttj").forEach(el => {
    const t = ttj(el.dataset.start || null, el.dataset.inplay === "1");
    el.textContent = t.text;
    el.className = "ttj " + t.cls;
  });
}

async function loadSports() {
  let sports;
  try { sports = await (await fetch("/api/sports")).json(); } catch (e) { sports = []; }
  if (!Array.isArray(sports)) sports = [];
  if (!sports.length) { $("races").innerHTML = '<div class="note">could not load sports — is the server reachable?</div>'; return; }
  const sel = $("sport");
  sel.innerHTML = sports.map(s =>
    `<option value="${esc(s.id)}">${SPORT_ICON[s.name] || "•"} ${esc(s.name)}</option>`).join("");
  sel.onchange = () => { store.set("sport", sel.value); loadItems(sel.value); };
  const saved = store.get("sport", null);
  const start = sports.find(s => s.id === saved) ? saved : (sports[0] && sports[0].id);
  if (start) { sel.value = start; loadItems(start); }
}

async function loadItems(typeId) {
  const gen = ++listGen;  // a slow depth-7 fetch must not overwrite a newer sport
  $("races").innerHTML = '<div class="note">loading…</div>';
  let next;
  try {
    next = await (await fetch("/api/list/" + typeId)).json();
  } catch (e) { next = []; }
  if (gen !== listGen) return;  // user switched sports while this was in flight
  items = Array.isArray(next) ? next : [];
  renderItems();
}

function selectItem(item) {
  currentItem = item;
  // the picker is built ONCE per item — rebuilding it inside poll() closed
  // the dropdown under the user's mouse every 3 seconds
  const box = $("pickerbox");
  box.innerHTML = "";
  const markets = item.markets || [];
  if (markets.length > 1) {
    const sel = document.createElement("select");
    for (const x of markets) {
      const opt = document.createElement("option");
      opt.value = x.marketId; opt.textContent = x.name;
      sel.appendChild(opt);
    }
    sel.value = item.marketId;
    sel.addEventListener("change", () => selectMarket(sel.value));
    box.appendChild(sel);
  }
  selectMarket(item.marketId);
}

function selectMarket(id) {
  selected = currentItem.marketId; marketId = id;
  pollGen += 1;  // orphan any in-flight fetch of the previous market
  history = {}; cumEst = {}; prevTotal = null; lastMarket = null;
  renderItems();
  const chosen = (currentItem.markets || []).find(x => x.marketId === id);
  $("title").textContent = currentItem.label + (chosen ? " — " + chosen.name : "");
  $("badges").innerHTML = '<span class="badge">loading…</span>';
  $("empty").style.display = "none"; $("board").style.display = "block";
  $("rows").innerHTML = ""; $("rowcount").textContent = "";
  if (pollTimer) clearInterval(pollTimer);
  poll();
  pollTimer = setInterval(poll, 3000);
}

function sparkline(pts) {
  if (pts.length < 2) return "";
  const prices = pts.map(p => p.price).filter(p => p != null);
  if (prices.length < 2) return "";
  const min = Math.min(...prices), max = Math.max(...prices), span = (max - min) || 1;
  const step = 120 / (pts.length - 1);
  let d = "", started = false;
  pts.forEach((p, i) => {
    if (p.price == null) return;
    const x = (i * step).toFixed(1), y = (22 - ((p.price - min) / span) * 18).toFixed(1);
    d += (started ? "L" : "M") + x + "," + y; started = true;
  });
  const last = prices[prices.length - 1], first = prices[0];
  const color = last < first ? "var(--steam)" : last > first ? "var(--drift)" : "var(--dim)";
  return `<svg class="spark" viewBox="0 0 120 26"><path d="${d}" fill="none" stroke="${color}" stroke-width="1.6"/></svg>`;
}

function flowWindow(pts, ms) {
  // estimated matched-flow delta over the trailing window
  if (!pts.length) return 0;
  const now = pts[pts.length - 1], cutoff = now.t - ms;
  let base = pts[0];
  for (const p of pts) { if (p.t <= cutoff) base = p; else break; }
  return Math.max(0, now.est - base.est);
}

function sessionMovePct(r) {
  const pts = history[r.name] || [];
  const first = pts.find(p => p.price != null);
  const lastP = r.lastTraded ?? r.back;
  if (!first || first.price == null || lastP == null) return 0;
  return 100 * (first.price - lastP) / first.price;  // + = firming
}

function womBar(r) {
  const b = r.backSize || 0, l = r.laySize || 0;
  if (b + l < 1) return '<span class="flowpct">—</span>';
  const backPct = 100 * b / (b + l);
  const tip = backPct >= 55 ? "backers" : backPct <= 45 ? "layers" : "even";
  return `<div class="womwrap" title="back ${fmtMoney(b)} vs lay ${fmtMoney(l)}">
    <div class="wom"><div class="womback" style="width:${backPct.toFixed(0)}%"></div></div>
    <span class="flowpct">${backPct.toFixed(0)}% ${tip}</span></div>`;
}

async function poll() {
  if (!marketId || paused) return;
  const gen = pollGen;
  let m;
  try { m = await (await fetch("/api/market/" + marketId)).json(); }
  catch (e) {
    if (gen === pollGen && !$("reconn")) $("badges").insertAdjacentHTML("beforeend", '<span class="badge" id="reconn">reconnecting…</span>');
    return;
  }
  if (gen !== pollGen) return;  // user switched markets while this was in flight
  if (m.detail) return;
  const now = Date.now();

  // The public endpoint zeroes per-selection matched volume, but the MARKET
  // total is exact — attribute each poll's new money to the selections whose
  // traded price ticked in that interval (money trades where price moves).
  const dM = prevTotal == null ? 0 : Math.max(0, m.totalMatched - prevTotal);
  prevTotal = m.totalMatched;
  const movers = m.runners.filter(r => {
    const pts = history[r.name];
    if (!pts || !pts.length) return false;
    return (r.lastTraded ?? r.back) !== pts[pts.length - 1].price;
  });
  movers.forEach(r => { cumEst[r.name] = (cumEst[r.name] || 0) + dM / movers.length; });
  m.runners.forEach(r => {
    (history[r.name] = history[r.name] || []).push(
      { t: now, est: cumEst[r.name] || 0, price: r.lastTraded ?? r.back });
    if (history[r.name].length > 400) history[r.name].shift();
  });

  lastMarket = m;
  render();
}

function render() {
  const m = lastMarket;
  if (!m) return;
  const t = ttj(m.start, m.inplay);
  $("title").textContent = `${m.eventName} — ${m.marketName}`;

  // book overround: sum of implied prob from best back across all runners.
  // >100% is the exchange's margin; near 100% is a tight, efficient book.
  let implied = 0;
  m.runners.forEach(r => { if (r.back) implied += 1 / r.back; });
  const over = implied > 0 ? 100 * implied : 0;
  const halted = m.status && m.status !== "OPEN";
  $("badges").innerHTML =
    (halted ? `<span class="badge live">⛔ ${m.status}</span>` : "")
    + `<span class="badge ${t.cls === "live" ? "live" : ""}">${m.inplay ? "🔴 IN PLAY" : "⏱ " + t.text}</span>
    <span class="badge">total matched <b>${fmtMoney(m.totalMatched)}</b></span>
    <span class="badge">available <b>${fmtMoney(m.totalAvailable)}</b></span>`
    + (over ? `<span class="badge ${over < 102 ? "tight" : ""}" title="Sum of implied probability from best-back prices. 100% is a perfectly efficient book; the excess is margin.">book ${over.toFixed(1)}%</span>` : "");

  const minLiq = +$("minliq").value;
  const tradeable = $("tradeable").checked;
  const sortby = $("sortby").value;

  // compute per-runner derived values on the FULL set (flow attribution used
  // all runners), then filter for display only
  let rows = m.runners.map(r => {
    const pts = history[r.name] || [];
    return { r, pts, flow: flowWindow(pts, 60000), move: sessionMovePct(r),
             liq: Math.max(r.backSize || 0, r.laySize || 0) };
  });
  const shown = rows.filter(x => {
    if (x.liq < minLiq) return false;
    if (tradeable && (x.r.back == null || x.r.back < 1.2 || x.r.back > 7.0)) return false;
    return true;
  });
  if (sortby === "flow") shown.sort((a, b) => b.flow - a.flow);
  else if (sortby === "move") shown.sort((a, b) => Math.abs(b.move) - Math.abs(a.move));
  // "price" keeps server order (favourite first, dead pegs last)

  const maxFlow = Math.max(...shown.map(x => x.flow), 1);
  const totalFlow = shown.reduce((a, x) => a + x.flow, 0);

  $("rowcount").textContent = shown.length < rows.length
    ? `showing ${shown.length} of ${rows.length} selections` : `${rows.length} selections`;

  $("rows").innerHTML = shown.map(({ r, pts, flow, move }) => {
    const lastP = r.lastTraded ?? r.back;
    let dir = "", rowcls = "";
    if (Math.abs(move) >= 1) {
      if (move > 0) { dir = `<span class="dir steam">▼ ${move.toFixed(0)}%</span>`; rowcls = "steamrow"; }
      else { dir = `<span class="dir drift">▲ ${(-move).toFixed(0)}%</span>`; rowcls = "driftrow"; }
    }
    const pct = totalFlow > 0 ? (100 * flow / totalFlow) : 0;
    const imp = r.back ? `<div class="imp">${(100 / r.back).toFixed(0)}%</div>` : "";
    return `<tr class="${rowcls}">
      <td class="name">${esc(r.name)}</td>
      <td class="num">${fmtOdds(r.back)}<div class="sizes">${r.backSize ? fmtMoney(r.backSize) : ""}</div></td>
      <td class="num">${fmtOdds(r.lay)}<div class="sizes">${r.laySize ? fmtMoney(r.laySize) : ""}</div></td>
      <td class="num price">${fmtOdds(r.lastTraded)}${dir}${imp}</td>
      <td>${sparkline(pts)}</td>
      <td class="flowcell"><div class="flowrow">
        <div class="flowbar ${flow < 1 ? "zero" : ""}" style="width:${Math.max(2, 100 * flow / maxFlow)}px"></div>
        <span class="flowpct">${flow >= 1 ? fmtMoney(flow) + " · " + pct.toFixed(0) + "%" : "—"}</span>
      </div></td>
      <td>${womBar(r)}</td>
    </tr>`;
  }).join("");

  $("foot").innerHTML = `<span class="pulse ${paused ? "paused" : ""}"></span>${paused ? "paused" : "polling every 3s"} · money bars = market money growth attributed to selections whose traded price ticked (estimate — Betfair's public feed hides exact per-selection volume) · % under Last = implied probability · pressure = visible back $ vs lay $ · ▼ firming (steam) · ▲ drifting`;
}

// --- controls
$("search").addEventListener("input", (e) => { searchText = e.target.value; renderItems(); });
$("sortby").addEventListener("change", (e) => { store.set("sortby", e.target.value); render(); });
$("minliq").addEventListener("change", (e) => { store.set("minliq", e.target.value); render(); });
$("tradeable").addEventListener("change", (e) => { store.set("tradeable", e.target.checked); render(); });
$("pause").addEventListener("click", () => {
  paused = !paused;
  $("pause").textContent = paused ? "▶ Resume" : "⏸ Pause";
  $("pause").classList.toggle("on", paused);
  if (!paused) poll();
  render();
});

// restore saved control settings
$("sortby").value = store.get("sortby", "price");
$("minliq").value = String(store.get("minliq", "0"));
$("tradeable").checked = store.get("tradeable", false);

loadSports();
setInterval(tickCountdowns, 1000);
</script>
</body>
</html>
