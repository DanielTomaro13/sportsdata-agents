<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Betfair money flow</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2330; --line: #2a3140;
    --text: #e6edf3; --dim: #8b96a5; --accent: #f0b429;
    --steam: #ff5d5d; --drift: #58a6ff; --money: #3fb950;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font: 14px/1.45 -apple-system, "Segoe UI", Roboto, sans-serif; }
  .wrap { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
  @media (max-width: 860px) { .wrap { grid-template-columns: 1fr; grid-template-rows: 40vh 1fr; } }

  aside { background: var(--panel); border-right: 1px solid var(--line); overflow-y: auto; }
  aside header { position: sticky; top: 0; background: var(--panel); padding: 14px 16px 12px; border-bottom: 1px solid var(--line); z-index: 2; }
  aside h1 { font-size: 15px; letter-spacing: .4px; }
  aside h1 span { color: var(--accent); }
  select { width: 100%; margin-top: 10px; background: var(--panel2); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 6px 8px; font: inherit; font-size: 13px; }
  .race { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; background: none; border: none; border-bottom: 1px solid var(--line); color: var(--text); padding: 10px 14px; cursor: pointer; font: inherit; }
  .race:hover { background: var(--panel2); }
  .race.sel { background: var(--panel2); box-shadow: inset 3px 0 var(--accent); }
  .race .v { font-weight: 600; font-size: 13px; }
  .race .m { color: var(--dim); font-size: 12px; }
  .race .ttj { margin-left: auto; font-variant-numeric: tabular-nums; font-size: 12px; color: var(--dim); white-space: nowrap; }
  .race .ttj.soon { color: var(--accent); font-weight: 700; }
  .race .ttj.live { color: var(--steam); font-weight: 700; }
  .note { color: var(--dim); font-size: 12px; padding: 14px; }

  main { overflow-y: auto; padding: 18px 22px; }
  .empty { color: var(--dim); margin-top: 30vh; text-align: center; }
  #head { display: flex; flex-wrap: wrap; align-items: center; gap: 10px 18px; margin-bottom: 4px; }
  #head h2 { font-size: 20px; }
  #head select { width: auto; margin: 0; }
  .badge { background: var(--panel2); border: 1px solid var(--line); border-radius: 6px; padding: 2px 10px; font-size: 12px; color: var(--dim); }
  .badge b { color: var(--text); font-variant-numeric: tabular-nums; }
  .badge.live { border-color: var(--steam); color: var(--steam); }
  #meta { color: var(--dim); font-size: 12px; margin: 6px 0 14px; }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .6px; padding: 6px 8px; border-bottom: 1px solid var(--line); }
  th.num, td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td { padding: 7px 8px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  td.name { font-weight: 600; }
  td.price { font-size: 16px; font-weight: 700; white-space: nowrap; }
  .dir { font-size: 11px; margin-left: 4px; }
  .steam { color: var(--steam); } .drift { color: var(--drift); }
  .spark { width: 120px; height: 26px; }
  .flowcell { min-width: 180px; }
  .flowbar { height: 14px; border-radius: 3px; background: var(--money); min-width: 2px; opacity: .9; }
  .flowbar.zero { background: var(--line); }
  .flowrow { display: flex; align-items: center; gap: 8px; }
  .flowpct { color: var(--dim); font-size: 12px; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .sizes { color: var(--dim); font-size: 11px; white-space: nowrap; }
  .womwrap { display: flex; align-items: center; gap: 8px; min-width: 150px; }
  .wom { width: 70px; height: 10px; border-radius: 3px; background: var(--steam); overflow: hidden; }
  .womback { height: 100%; background: var(--money); }
  #foot { color: var(--dim); font-size: 11px; margin-top: 12px; }
  .pulse { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--money); margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 50% { opacity: .25; } }
</style>
</head>
<body>
<div class="wrap">
  <aside>
    <header>
      <h1>💸 Betfair <span>money flow</span></h1>
      <select id="sport"></select>
    </header>
    <div id="races"><div class="note">loading sports…</div></div>
  </aside>
  <main>
    <div class="empty" id="empty">← pick a sport, then a race or match</div>
    <div id="board" style="display:none">
      <div id="head"></div>
      <div id="meta"></div>
      <table>
        <thead><tr>
          <th>Selection</th><th class="num">Back</th><th class="num">Lay</th>
          <th class="num">Last</th><th>Price (session)</th>
          <th>Money in last 60s (est)</th><th>Pressure (back vs lay $)</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="foot"></div>
    </div>
  </main>
</div>
<script>
const $ = (id) => document.getElementById(id);
const fmtMoney = (v) => v >= 1000 ? "$" + (v / 1000).toFixed(v >= 10000 ? 0 : 1) + "k" : "$" + Math.round(v);
const fmtOdds = (v) => v == null ? "—" : (v < 10 ? v.toFixed(2) : v.toFixed(1));

const SPORT_ICON = {
  "Horse Racing": "🐎", "Greyhound Racing": "🐕", "Soccer": "⚽", "Tennis": "🎾",
  "Cricket": "🏏", "Rugby Union": "🏉", "Rugby League": "🏉", "Australian Rules": "🏉",
  "Basketball": "🏀", "Baseball": "⚾", "Ice Hockey": "🏒", "American Football": "🏈",
  "Golf": "⛳", "Boxing": "🥊", "Mixed Martial Arts": "🥋", "Darts": "🎯",
  "Snooker": "🎱", "Motor Sport": "🏎", "Cycling": "🚴", "Esports": "🎮",
  "Politics": "🗳", "Special Bets": "✨",
};

let items = [], selected = null, currentItem = null;
let history = {};       // selection name -> [{t, est, price}]
let cumEst = {};        // selection name -> cumulative estimated matched flow
let prevTotal = null;   // market totalMatched at previous poll
let pollTimer = null, marketId = null;

function ttj(startIso, inplay) {
  if (inplay) return { text: "LIVE", cls: "live" };
  if (!startIso) return { text: "", cls: "" };
  const s = (new Date(startIso) - Date.now()) / 1000;
  if (s <= -120) return { text: "started", cls: "live" };
  if (s <= 0) return { text: "starting", cls: "live" };
  const m = Math.floor(s / 60);
  if (m >= 2880) return { text: Math.floor(m / 1440) + "d", cls: "" };
  if (m >= 60) return { text: Math.floor(m / 60) + "h " + (m % 60) + "m", cls: "" };
  return { text: m + "m " + Math.floor(s % 60) + "s", cls: m < 5 ? "soon" : "" };
}

function renderItems() {
  const box = $("races");
  box.innerHTML = "";
  if (!items.length) { box.innerHTML = '<div class="note">nothing listed right now</div>'; return; }
  items
    .filter(r => !r.start || new Date(r.start) - Date.now() > -6 * 3600000 || r.inplay)
    .forEach(r => {
      const t = ttj(r.start, r.inplay);
      const el = document.createElement("button");
      el.className = "race" + (selected === r.marketId ? " sel" : "");
      el.innerHTML = `<span><div class="v">${r.label}</div>
        <div class="m">${r.sub || ""}</div></span>
        <span class="ttj ${t.cls}">${t.text}</span>`;
      el.onclick = () => selectItem(r);
      box.appendChild(el);
    });
}

async function loadSports() {
  const sports = await (await fetch("/api/sports")).json();
  const sel = $("sport");
  sel.innerHTML = sports.map(s =>
    `<option value="${s.id}">${SPORT_ICON[s.name] || "•"} ${s.name}</option>`).join("");
  sel.onchange = () => loadItems(sel.value);
  if (sports.length) loadItems(sports[0].id);
}

async function loadItems(typeId) {
  $("races").innerHTML = '<div class="note">loading…</div>';
  try {
    items = await (await fetch("/api/list/" + typeId)).json();
  } catch (e) { items = []; }
  renderItems();
}

function selectItem(item) {
  currentItem = item;
  selectMarket(item.marketId);
}

function selectMarket(id) {
  selected = currentItem.marketId; marketId = id;
  history = {}; cumEst = {}; prevTotal = null;
  renderItems();
  $("empty").style.display = "none"; $("board").style.display = "block";
  $("rows").innerHTML = ""; $("head").innerHTML = "loading…"; $("meta").textContent = "";
  if (pollTimer) clearInterval(pollTimer);
  poll();
  pollTimer = setInterval(poll, 3000);
}

function marketPicker(m) {
  const markets = (currentItem && currentItem.markets) || [];
  if (markets.length < 2) return "";
  return `<select id="mktsel" onchange="selectMarket(this.value)">` + markets.map(x =>
    `<option value="${x.marketId}" ${x.marketId === marketId ? "selected" : ""}>${x.name}</option>`
  ).join("") + `</select>`;
}

function sparkline(pts) {
  if (pts.length < 2) return "";
  const prices = pts.map(p => p.price).filter(p => p != null);
  if (prices.length < 2) return "";
  const min = Math.min(...prices), max = Math.max(...prices), span = (max - min) || 1;
  const step = 120 / (pts.length - 1);
  let d = "", started = false;
  pts.forEach((p, i) => {
    if (p.price == null) return;
    const x = (i * step).toFixed(1), y = (22 - ((p.price - min) / span) * 18).toFixed(1);
    d += (started ? "L" : "M") + x + "," + y; started = true;
  });
  const last = prices[prices.length - 1], first = prices[0];
  const color = last < first ? "var(--steam)" : last > first ? "var(--drift)" : "var(--dim)";
  return `<svg class="spark" viewBox="0 0 120 26"><path d="${d}" fill="none" stroke="${color}" stroke-width="1.6"/></svg>`;
}

function flowWindow(pts, ms) {
  // estimated matched-flow delta over the trailing window
  if (!pts.length) return 0;
  const now = pts[pts.length - 1], cutoff = now.t - ms;
  let base = pts[0];
  for (const p of pts) { if (p.t <= cutoff) base = p; else break; }
  return Math.max(0, now.est - base.est);
}

function womBar(r) {
  const b = r.backSize || 0, l = r.laySize || 0;
  if (b + l < 1) return '<span class="flowpct">—</span>';
  const backPct = 100 * b / (b + l);
  const tip = backPct >= 55 ? "backers" : backPct <= 45 ? "layers" : "even";
  return `<div class="womwrap" title="back ${fmtMoney(b)} vs lay ${fmtMoney(l)}">
    <div class="wom"><div class="womback" style="width:${backPct.toFixed(0)}%"></div></div>
    <span class="flowpct">${backPct.toFixed(0)}% ${tip}</span></div>`;
}

async function poll() {
  if (!marketId) return;
  let m;
  try { m = await (await fetch("/api/market/" + marketId)).json(); }
  catch (e) { return; }
  if (m.detail) return;
  const now = Date.now();

  // The public endpoint zeroes per-runner matched volume, but the MARKET
  // total is exact — attribute each poll's new money to the selections whose
  // traded price ticked in that interval (money trades where price moves).
  const dM = prevTotal == null ? 0 : Math.max(0, m.totalMatched - prevTotal);
  prevTotal = m.totalMatched;
  const movers = m.runners.filter(r => {
    const pts = history[r.name];
    if (!pts || !pts.length) return false;
    return (r.lastTraded ?? r.back) !== pts[pts.length - 1].price;
  });
  movers.forEach(r => { cumEst[r.name] = (cumEst[r.name] || 0) + dM / movers.length; });

  m.runners.forEach(r => {
    (history[r.name] = history[r.name] || []).push(
      { t: now, est: cumEst[r.name] || 0, price: r.lastTraded ?? r.back });
    if (history[r.name].length > 400) history[r.name].shift();
  });

  const t = ttj(m.start, m.inplay);
  $("head").innerHTML = `<h2>${m.eventName} — ${m.marketName}</h2>${marketPicker(m)}
    <span class="badge ${t.cls === "live" ? "live" : ""}">${m.inplay ? "🔴 IN PLAY" : "⏱ " + t.text}</span>
    <span class="badge">total matched <b>${fmtMoney(m.totalMatched)}</b></span>
    <span class="badge">available <b>${fmtMoney(m.totalAvailable)}</b></span>`;

  const flows = m.runners.map(r => flowWindow(history[r.name] || [], 60000));
  const maxFlow = Math.max(...flows, 1);
  const totalFlow = flows.reduce((a, b) => a + b, 0);

  $("rows").innerHTML = m.runners.map((r, i) => {
    const pts = history[r.name] || [];
    const first = pts.find(p => p.price != null), lastP = r.lastTraded ?? r.back;
    let dir = "";
    if (first && lastP != null && first.price != null && lastP !== first.price) {
      dir = lastP < first.price
        ? `<span class="dir steam">▼ ${(100 * (first.price - lastP) / first.price).toFixed(0)}%</span>`
        : `<span class="dir drift">▲ ${(100 * (lastP - first.price) / first.price).toFixed(0)}%</span>`;
    }
    const flow = flows[i];
    const pct = totalFlow > 0 ? (100 * flow / totalFlow) : 0;
    return `<tr>
      <td class="name">${r.name}</td>
      <td class="num">${fmtOdds(r.back)}<div class="sizes">${r.backSize ? fmtMoney(r.backSize) : ""}</div></td>
      <td class="num">${fmtOdds(r.lay)}<div class="sizes">${r.laySize ? fmtMoney(r.laySize) : ""}</div></td>
      <td class="num price">${fmtOdds(r.lastTraded)}${dir}</td>
      <td>${sparkline(pts)}</td>
      <td class="flowcell"><div class="flowrow">
        <div class="flowbar ${flow < 1 ? "zero" : ""}" style="width:${Math.max(2, 100 * flow / maxFlow)}px"></div>
        <span class="flowpct">${flow >= 1 ? fmtMoney(flow) + " · " + pct.toFixed(0) + "%" : "—"}</span>
      </div></td>
      <td>${womBar(r)}</td>
    </tr>`;
  }).join("");

  $("foot").innerHTML = `<span class="pulse"></span>polling every 3s · money bars = market money growth attributed to selections whose traded price ticked (estimate — Betfair's public feed hides exact per-selection volume) · pressure = visible back $ vs lay $ at best price · ▼ firming (steam) · ▲ drifting`;
}

loadSports();
setInterval(renderItems, 1000);  // tick countdowns
</script>
</body>
</html>
